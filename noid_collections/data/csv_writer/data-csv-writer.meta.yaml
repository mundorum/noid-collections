id: data:csv-writer
name: CSV Writer
description: 'Streams incoming CSV table or row notices to a temporary file and atomically
  publishes it to output_file when a done notice is received. Mirrors the two output
  modes of data:csv-source: complete table (table + done) or row-by-row (schema +
  row… + done).'
properties:
  output_file:
    description: Destination file path (required).
    default: ''
    required: false
    kind: resource
  encoding:
    description: File encoding.
    default: utf-8
    required: false
  format:
    description: 'Row payload format, matching data:csv-source. ''dict'' (default):
      each row is {col: value, ...}. ''list'' (compact): each row is [value, ...]
      ordered by columns.'
    default: dict
    required: false
input_notices:
  table:
    description: 'Complete table payload. (Re)starts the file, discarding any previously
      written content. Keys: columns (list of str), rows (list of dicts or lists).
      Optional label key is ignored.'
  schema:
    description: 'Column names for row-by-row mode. (Re)starts the file, discarding
      any previously written content. Key: columns (list of str). Optional label key
      is ignored.'
  row:
    description: 'One data row, written immediately. Key: row (dict or list depending
      on format). Optional label and index keys are ignored.'
  done:
    description: Finalizes the file and emits the done notice.
output_notices:
  written:
    description: Emitted after each physical write (schema/table/row).
  done:
    description: 'Emitted once the file is finalized and ready to use. Payload key:
      file (str).'
