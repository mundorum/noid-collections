id: data:text-writer
name: Text Writer
description: Streams incoming document or segment notices to a temporary file and
  atomically publishes it to output_file when a done notice is received.
properties:
  output_file:
    description: Destination file path (required).
    default: ''
    required: false
    kind: resource
  encoding:
    description: File encoding.
    default: utf-8
    required: false
  segment_separator:
    description: Text inserted between accumulated segments.
    default: '


      '
    required: false
input_notices:
  document:
    description: 'Complete text content. (Re)starts the file, discarding any previously
      written content. Payload key: content (str).'
  segment:
    description: 'One segment of content, written immediately. Payload key: content
      (str).'
  done:
    description: Finalizes the file and emits the done notice.
output_notices:
  written:
    description: Emitted after each physical write (document/segment).
  done:
    description: 'Emitted once the file is finalized and ready to use. Payload key:
      file (str).'
