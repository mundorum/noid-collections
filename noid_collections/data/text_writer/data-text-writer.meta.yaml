id: data:text-writer
name: Text Writer
description: Buffers incoming text or page notices and writes them to a file when
  a done notice is received.
properties:
  output_file:
    description: Destination file path (required).
    default: ''
    required: false
    kind: resource
  encoding:
    description: File encoding.
    default: utf-8
    required: false
  append:
    description: Append to an existing file instead of overwriting.
    default: false
    required: false
  page_separator:
    description: Text inserted between accumulated page segments.
    default: '


      '
    required: false
input_notices:
  text:
    description: 'Complete text content. Buffered until done. Payload key: content
      (str).'
  page:
    description: 'One page of content. Accumulated until done. Payload key: content
      (str).'
  done:
    description: Triggers the file write and emits the written notice.
output_notices:
  written:
    description: 'Emitted after the file is flushed to disk. Payload key: file (str).'
