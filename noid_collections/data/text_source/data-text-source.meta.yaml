id: data:text-source
name: Text Source
description: Publishes its text property as a message whenever triggered. To auto-start,
  wire player/start to the trigger notice in the scene.
properties:
  text:
    description: Text content to publish when triggered.
    default: ''
    required: false
  label:
    description: Label included in the published payload to identify this source.
    default: text
    required: false
input_notices:
  trigger:
    description: Triggers publication of the text content.
output_notices:
  text:
    description: 'Emitted when triggered. Payload keys: label (str), content (str).'
  done:
    description: Emitted after text, signaling pipeline completion.
