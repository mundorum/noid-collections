id: data:text-source
name: Text Source
description: Publishes text content as a message whenever a load notice arrives. Content
  can be provided inline via the text property or read from a file. To auto-start,
  wire player/start to the load notice in the scene.
properties:
  text:
    description: Inline text content to publish. Ignored if `input_file` is set.
    default: ''
    required: false
  input_file:
    description: Path to a text file whose content is published. Takes precedence
      over `text`.
    default: ''
    required: false
  label:
    description: Label included in the published payload to identify this source.
    default: text
    required: false
input_notices:
  load:
    description: Loads and publishes the text content (from input_file if set, else
      from the text property).
output_notices:
  text:
    description: 'Emitted when loaded. Payload keys: label (str), content (str).'
  done:
    description: Emitted after text, signaling pipeline completion.
