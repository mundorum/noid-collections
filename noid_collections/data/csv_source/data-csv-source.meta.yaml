id: data:csv-source
name: CSV Source
description: Reads CSV data and publishes it in full-table mode or row-by-row mode
  with a movable cursor. Content can be provided inline or read from a file. An optional
  sample_size limits the number of rows served.
properties:
  content:
    description: Inline CSV text, including a header row as the first line. Ignored
      if `input_file` is set.
    default: ''
    required: false
  input_file:
    description: Path to a CSV file to read. Takes precedence over `content`.
    default: ''
    required: false
  label:
    description: Label included in every published payload to identify this source.
    default: csv
    required: false
  sample_size:
    description: Maximum number of rows to serve. 0 means no limit. Applies consistently
      to all modes (load, first, next).
    default: 0
    required: false
input_notices:
  load:
    description: Publish the entire CSV as a structured table.
  first:
    description: Reset the row cursor; publish schema then the first row.
  next:
    description: Advance the cursor; publish the next row, or exhausted if none remain.
output_notices:
  table:
    description: 'Full table payload. Keys: label, columns (list of str), rows (list
      of dicts).'
  schema:
    description: 'Column names only. Keys: label, columns (list of str). Emitted before
      the first row.'
  row:
    description: 'One data row. Keys: label, index (int), row (dict).'
  exhausted:
    description: 'All rows have been served. Key: label.'
