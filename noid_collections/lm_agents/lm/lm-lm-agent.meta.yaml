id: lm:lm-agent
name: LM Agent
description: Calls an Ollama LLM with a rendered prompt template and publishes the
  reply.
properties:
  model:
    description: Ollama model name to use for inference.
    default: llama3.2
    required: false
  host:
    description: Ollama server URL.
    default: http://localhost:11434
    required: false
  prompt_template:
    description: Prompt template. Supports {input}, {question}, flat message keys
      as {key}, and dot-separated paths into nested fields as {row.name}.
    default: '{input}'
    required: false
    kind: text
  temperature:
    description: Sampling temperature (0 = deterministic, higher = more creative).
    default: 0.1
    required: false
  csv_field:
    description: 'Field name added directly below `row` (no dotted paths). Setting
      this property switches the component into CSV mode: `schema` and `row` notices
      are handled, and the `document` output carries the enriched input dict instead
      of {content, model}. Must not be set for plain, non-CSV usage — it has no default
      value.'
    required: true
input_notices:
  input:
    description: 'Triggers LLM inference on a single item. Payload keys: content (str),
      question (str, optional). Also accepts a plain string.'
  schema:
    description: 'CSV column schema. Payload keys: label (optional), columns (list
      of str). Ignored if `csv_field` is not set.'
  row:
    description: 'One CSV row. Payload keys: label (optional), index (optional), row
      (dict). Ignored if `csv_field` is not set.'
output_notices:
  document:
    description: 'LLM reply for a single item. When csv_field is set: enriched input
      dict. Otherwise: {content (str), model (str)}.'
  schema:
    description: Input schema with csv_field appended to columns. Emitted in response
      to the schema notice.
  row:
    description: Input row with the LLM reply added under row[csv_field]. label/index
      are passed through unchanged.
