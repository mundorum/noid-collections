id: pdf:extractor-markitdown
name: PDF Extractor MarkItDown
description: Extracts text from a PDF as flowing Markdown using MarkItDown. Interchangeable
  with pdf:extractor-pymupdf in scene pipelines.
properties:
  input_file:
    description: Path to the PDF to extract. Can be overridden by the extract notice
      payload.
    default: ''
    required: false
  output_mode:
    description: 'Dispatch mode: complete (one text notice) or page_by_page (one page
      notice; MarkItDown has no page boundaries so total is always 1).'
    default: complete
    required: false
input_notices:
  extract:
    description: Trigger text extraction. Payload key file (str) overrides the input_file
      property.
output_notices:
  text:
    description: 'Extracted Markdown content (complete mode). Keys: file (str), content
      (str), pages (null).'
  page:
    description: 'Extracted content as a single page (page_by_page mode). Keys: file,
      page (1), total (1), content (str).'
  done:
    description: 'Extraction complete. Keys: file (str), pages (null).'
  error:
    description: 'Extraction failed. Keys: file (str), error (str).'
  status:
    description: Progress message string emitted during extraction.
